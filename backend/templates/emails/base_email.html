<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}RoadSight AI{% endblock %}</title>
</head>
<body style="margin:0;padding:0;background:#f8f9fa;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f8f9fa;padding:40px 0;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;">

          <!-- Header with brand gradient -->
          <tr>
            <td style="background:linear-gradient(135deg,#1c4280 0%,#0190cf 100%);border-radius:12px 12px 0 0;padding:28px 40px;text-align:center;">
              <span style="color:#ffffff;font-size:20px;font-weight:700;letter-spacing:0.5px;">RoadSight AI</span>
              <p style="margin:4px 0 0;color:rgba(255,255,255,0.75);font-size:12px;letter-spacing:0.3px;">AI-powered road asset inventory &amp; condition survey platform.</p>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="background:#ffffff;padding:40px 40px 32px;border-left:1px solid #d9dde5;border-right:1px solid #d9dde5;">
              {% block content %}{% endblock %}
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background:#f1f3f5;border:1px solid #d9dde5;border-top:none;border-radius:0 0 12px 12px;padding:20px 40px;text-align:center;">
              <p style="margin:0;color:#757d8a;font-size:12px;line-height:1.6;">
                This is an automated message from RoadSight AI. Please do not reply to this email.
              </p>
              <p style="margin:8px 0 0;color:#a0a8b4;font-size:11px;">
                &copy; 2026 RoadSight AI
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
